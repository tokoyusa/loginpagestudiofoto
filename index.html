<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Verifikasi Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <!-- Menambahkan tag img untuk logo -->
            <!-- Ganti src di bawah ini dengan URL dari Supabase Storage Anda -->
            <img 
                src="https://ptzueextdvcahhzwetyg.supabase.co/storage/v1/object/public/images/logo.png" 
                alt="Logo Studio Foto" 
                class="mx-auto w-28 h-28 object-contain mb-4 rounded-xl shadow-sm"
                onerror="this.onerror=null; this.outerHTML='<div class=\'inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-4\'><svg xmlns=\'http://www.w3.org/2000/svg\' class=\'h-8 w-8\' fill=\'none\' viewbox=\'0 0 24 24\' stroke=\'currentColor\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z\' /></svg></div>';"
            >
            <h1 class="text-2xl font-bold text-gray-800">Foto Studio AI</h1>
            <p class="text-gray-500 mt-2">Masukkan email terdaftar di tokoyusa.vercel.app untuk melanjutkan</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Alamat Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="nama@email.com" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                >
            </div>

            <button 
                type="submit" 
                id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed"
            >
                <span id="btnText">Masuk</span>
                <svg id="loadingSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="message" class="mt-6 hidden p-4 rounded-lg text-sm text-center"></div>
        
        <p class="mt-8 text-center text-xs text-gray-400">
            &copy; 2026 Sistem Verifikasi Profil. Semua Hak Dilindungi.
        </p>
    </div>

    <script>
        const SUPABASE_URL = 'https://ptzueextdvcahhzwetyg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0enVlZXh0ZHZjYWhoendldHlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2NDc4NTUsImV4cCI6MjA4MDIyMzg1NX0.qixPyd0ehMDSUqFMMKheHSF1NizClSQHx1SbFApCP4o';
        const TARGET_URL = 'https://gemini.google.com/share/77fafa3a69de';

        // Auto-redirect jika sudah terautentikasi
        if (localStorage.getItem('is_authenticated') === 'true') {
            window.location.replace(TARGET_URL);
        }

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const messageDiv = document.getElementById('message');

        function showMessage(htmlContent, isError = true) {
            messageDiv.innerHTML = htmlContent;
            messageDiv.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
            
            if (isError) {
                messageDiv.classList.add('bg-red-50', 'text-red-700');
            } else {
                messageDiv.classList.add('bg-green-50', 'text-green-700');
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim().toLowerCase();

            messageDiv.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.textContent = 'Memverifikasi...';
            loadingSpinner.classList.remove('hidden');

            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('email')
                    .eq('email', email);

                if (error) throw error;

                if (data && data.length > 0) {
                    localStorage.setItem('is_authenticated', 'true');
                    localStorage.setItem('user_email', email);

                    // Memberikan link manual sebagai fallback jika redirect otomatis gagal
                    showMessage(`
                        <p class="font-bold">Verifikasi Berhasil!</p>
                        <p class="mt-1">Mengarahkan secara otomatis... atau <a href="${TARGET_URL}" class="underline font-semibold">klik di sini</a> jika tidak berpindah.</p>
                    `, false);
                    
                    // Gunakan replace agar tidak bisa "back" ke login lagi
                    setTimeout(() => {
                        window.location.replace(TARGET_URL);
                    }, 800);
                } else {
                    showMessage('Email tidak ditemukan dalam daftar profil kami.');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Masuk';
                    loadingSpinner.classList.add('hidden');
                }

            } catch (err) {
                console.error('Error:', err);
                showMessage('Terjadi kesalahan koneksi. Silakan coba lagi.');
                submitBtn.disabled = false;
                btnText.textContent = 'Masuk';
                loadingSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
